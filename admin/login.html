<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | ABI Harosfaid Limited</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <img src="logo.png" alt="ABI Harosfaid Limited">
    <h1>Admin Dashboard</h1>
    <p class="sub">Sign in to manage quotes, bookings, and site content.</p>

    <div class="login-error" id="login-error"></div>

    <form class="login-form" id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  // Already logged in? Skip straight to dashboard.
  if (auth.isLoggedIn()) window.location.href = 'dashboard.html';

  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch(`${ADMIN_API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');

      auth.setSession(data);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorBox.textContent = err.message || 'Invalid email or password.';
      errorBox.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
